services:
  db:
    image: postgres:15
    container_name: aegismind-db
    restart: always
    environment:
      POSTGRES_USER: aegisuser
      POSTGRES_PASSWORD: aegispassword
      POSTGRES_DB: aegismind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: aegismind-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://aegisuser:aegispassword@db:5432/aegismind
    depends_on:
      - db

  redis:
    image: redis:alpine
    container_name: aegismind-redis
    ports:
      - "6379:6379"

  frontend:
    build: ./frontend
    container_name: aegismind-frontend
    environment:
      - VITE_PROXY_TARGET=http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
